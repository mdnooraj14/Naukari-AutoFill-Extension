<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="64" cy="64" r="64" fill="url(#gradient)"/>

  <!-- Inner white circle -->
  <circle cx="64" cy="64" r="58" fill="white"/>

  <!-- GPT brain/sparkle icon -->
  <!-- Central circle (brain) -->
  <circle cx="64" cy="64" r="28" fill="url(#gradient)" opacity="0.9"/>

  <!-- Sparkle stars around brain -->
  <!-- Top sparkle -->
  <g transform="translate(64, 28)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="url(#gradient)"/>
  </g>

  <!-- Right sparkle -->
  <g transform="translate(94, 64)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="url(#gradient)"/>
  </g>

  <!-- Bottom sparkle -->
  <g transform="translate(64, 100)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="url(#gradient)"/>
  </g>

  <!-- Left sparkle -->
  <g transform="translate(34, 64)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="url(#gradient)"/>
  </g>

  <!-- Top-right diagonal sparkle -->
  <g transform="translate(84, 38)">
    <polygon points="0,-6 1.5,-1.5 6,-1 2,2 3,7 0,3.5 -3,7 -2,2 -6,-1 -1.5,-1.5" fill="#667eea" opacity="0.7"/>
  </g>

  <!-- Bottom-right diagonal sparkle -->
  <g transform="translate(84, 90)">
    <polygon points="0,-6 1.5,-1.5 6,-1 2,2 3,7 0,3.5 -3,7 -2,2 -6,-1 -1.5,-1.5" fill="#667eea" opacity="0.7"/>
  </g>

  <!-- Bottom-left diagonal sparkle -->
  <g transform="translate(44, 90)">
    <polygon points="0,-6 1.5,-1.5 6,-1 2,2 3,7 0,3.5 -3,7 -2,2 -6,-1 -1.5,-1.5" fill="#667eea" opacity="0.7"/>
  </g>

  <!-- Top-left diagonal sparkle -->
  <g transform="translate(44, 38)">
    <polygon points="0,-6 1.5,-1.5 6,-1 2,2 3,7 0,3.5 -3,7 -2,2 -6,-1 -1.5,-1.5" fill="#667eea" opacity="0.7"/>
  </g>

  <!-- Inner details on brain -->
  <circle cx="64" cy="60" r="4" fill="white" opacity="0.8"/>
  <circle cx="58" cy="66" r="3" fill="white" opacity="0.6"/>
  <circle cx="70" cy="68" r="3" fill="white" opacity="0.6"/>
</svg>
