<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Enhancer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Prompt Enhancer</h1>
            <p>Transform your raw prompts into clear, structured prompts</p>
        </div>

        <!-- Input Section -->
        <div class="section">
            <label for="rawPrompt">Your Raw Prompt:</label>
            <textarea id="rawPrompt" placeholder="Paste your raw prompt here... Example: write a function that converts celsius to fahrenheit"></textarea>
        </div>

        <!-- Options Section -->
        <div class="options">
            <label class="toggle-label">
                <input type="checkbox" id="detailedMode" checked>
                <span>Detailed Prompt</span>
            </label>
            <button id="clearBtn" class="btn-secondary">Clear</button>
        </div>

        <!-- Action Buttons -->
        <button id="enhanceBtn" class="btn-primary">✨ Enhance Prompt</button>

        <!-- Output Section -->
        <div class="section" id="outputSection" style="display: none;">
            <div class="output-header">
                <h3>Enhanced Prompt:</h3>
                <button id="copyBtn" class="btn-copy" title="Copy to clipboard">📋 Copy</button>
            </div>
            <div id="enhancedPrompt" class="output-box"></div>
        </div>

        <!-- History Section -->
        <div class="section" id="historySection" style="display: none;">
            <h3>Recent Prompts:</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn" class="btn-secondary-small">Clear History</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Made with ❤️ for better prompts</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
